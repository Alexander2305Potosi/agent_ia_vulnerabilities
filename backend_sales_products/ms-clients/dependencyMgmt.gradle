configurations.all {
    resolutionStrategy.eachDependency { DependencyResolveDetails details ->
        if (details.requested.group == 'org.springframework.boot') {
            details.useVersion "${springBootVersion}"
            details.because "Fix: CVE-2026-1001"
        }
        if (details.requested.group == 'com.fasterxml.jackson.core') {
            details.useVersion "${jacksonCoreVersion}"
            details.because "Fix: CVE-2026-2002"
        }
        if (details.requested.group == 'org.apache.logging.log4j') {
            details.useVersion "${log4jCoreVersion}"
            details.because "Fix: CVE-2026-3003"
        }
        if (details.requested.group == 'io.netty') {
            details.useVersion "${nettyCodecVersion}"
            details.because "Fix: CVE-2026-33871"
        }
    }
}
