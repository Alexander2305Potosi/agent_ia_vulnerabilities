spring:
  application:
    name: ms-products

server:
  port: 8082

# SOAP Service Configuration
soap:
  service:
    url: http://localhost:8081/ws/product
    timeout: 10000  # 10 segundos timeout para SOAP

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        slowCallRateThreshold: 80
        slowCallDurationThreshold: 2s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        record-exceptions:
          - java.lang.Exception
          - java.io.IOException
          - java.util.concurrent.TimeoutException
    instances:
      soapService:
        baseConfig: default
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
  ratelimiter:
    configs:
      default:
        limitForPeriod: 100
        limitRefreshPeriod: 1m
        timeoutDuration: 500ms
    instances:
      productApi:
        limitForPeriod: 50
        limitRefreshPeriod: 1m
        timeoutDuration: 1s
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
        cancelRunningFuture: true
    instances:
      soapService:
        timeoutDuration: 10s

# SpringDoc / Swagger OpenAPI
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  info:
    title: MS-Products API
    description: API para consulta de productos con integración SOAP
    version: 1.0.0
    contact:
      name: Development Team
    license:
      name: Apache 2.0

# Management / Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
    metrics:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

# Logging
logging:
  level:
    com.example.ms_products: DEBUG
    org.springframework.web.reactive: INFO
    io.github.resilience4j: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"
